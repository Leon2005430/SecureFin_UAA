<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFin Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo-section">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="SecureFin Logo"
                 class="logo">

            <h1>Create New Account</h1>

        </div>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Full Name
                </label>

                <input type="text"
                       name="fullname"
                       class="form-control custom-input"
                       placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Username / Customer ID
                </label>

                <input type="text"
                       name="username"
                       class="form-control custom-input"
                       placeholder="12-20 characters">

		<div class="form-text text-muted">Must be between 12 and 20 characters.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       class="form-control custom-input"
                       placeholder="Enter your email address">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control custom-input"
                       placeholder="Create a strong password">
            </div>

            <div class="password-box">

                <h5>Strong Password Requirements</h5>

                <ul>
                    <li>Minimum 8 characters</li>
                    <li>Must have UPPERCASE letter</li>
                    <li>Must have lowercase letter</li>
                    <li>Must have number</li>
                    <li>At least one special character</li>
                </ul>

            </div>

            <div class="mb-4 mt-3">

                <label class="form-label">
                    Confirm Password
                </label>

                <input type="password"
                       name="confirm_password"
                       class="form-control custom-input"
                       placeholder="Re-enter your password">

            </div>

            <button type="submit" class="login-btn">
                Create Account
            </button>

        </form>

        <div class="text-center mt-4">

            <p class="signin-text">
                Already have an account?

                <a href="/" class="forgot-link">
                    Sign In
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
